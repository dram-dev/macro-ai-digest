# FRED series — full curated set tuned for Fed/markets, macro, and AI capex.
# Sigma threshold: items only created when |z| >= this value (quiet filter).

sigma_threshold: 1.0

series:
  # ── Inflation ─────────────────────────────────────────────────────────
  - id: PCEPILFE
    label: Core PCE YoY
  - id: CPIAUCSL
    label: CPI YoY
  - id: CPILFESL
    label: Core CPI YoY
  - id: T10YIE
    label: 10Y breakeven inflation
  - id: T5YIFR
    label: 5Y5Y forward inflation expectation

  # ── Interest rates ────────────────────────────────────────────────────
  - id: DFEDTARU
    label: Fed Funds target (upper)
  - id: DFEDTARL
    label: Fed Funds target (lower)
  - id: EFFR
    label: Effective Fed Funds rate
  - id: SOFR
    label: SOFR
  - id: DPRIME
    label: Bank prime loan rate

  # ── Treasury yields & spreads ─────────────────────────────────────────
  - id: DGS2
    label: 2Y Treasury yield
  - id: DGS10
    label: 10Y Treasury yield
  - id: DGS30
    label: 30Y Treasury yield
  - id: T10Y2Y
    label: 2s10s spread
  - id: T10Y3M
    label: 10Y-3M spread (recession indicator)

  # ── Credit spreads ────────────────────────────────────────────────────
  - id: BAMLH0A0HYM2
    label: HY OAS spread (ICE BofA)
  - id: BAMLC0A0CM
    label: IG OAS spread (ICE BofA)
  - id: AAA
    label: AAA corporate yield (Moody's)
  - id: BAA
    label: BAA corporate yield (Moody's)

  # ── Employment ────────────────────────────────────────────────────────
  - id: UNRATE
    label: Unemployment rate
  - id: PAYEMS
    label: Nonfarm payrolls
  - id: ICSA
    label: Initial jobless claims
  - id: JTSJOL
    label: JOLTS job openings

  # ── Growth & output ───────────────────────────────────────────────────
  - id: GDPC1
    label: Real GDP (quarterly)
  - id: INDPRO
    label: Industrial production index
  - id: RSAFS
    label: Retail sales (advance)

  # ── Money & liquidity ─────────────────────────────────────────────────
  - id: M2SL
    label: M2 money supply
  - id: WALCL
    label: Fed balance sheet total assets
  - id: RRPONTSYD
    label: Overnight reverse repo

  # ── Financial conditions ──────────────────────────────────────────────
  - id: NFCI
    label: Chicago Fed NFCI
  - id: STLFSI2
    label: St. Louis Fed financial stress index
  - id: VIXCLS
    label: VIX (CBOE via FRED)

  # ── Sentiment ─────────────────────────────────────────────────────────
  - id: UMCSENT
    label: U. Michigan consumer sentiment

  # ── China / FX ────────────────────────────────────────────────────────
  - id: DEXCHUS
    label: USD/CNY exchange rate
  - id: DTWEXBGS
    label: USD trade-weighted index (broad)
  - id: DEXUSEU
    label: USD/EUR exchange rate

  # ── Housing ───────────────────────────────────────────────────────────
  - id: MORTGAGE30US
    label: 30Y fixed mortgage rate
